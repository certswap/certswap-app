<!DOCTYPE html>
<html data-i18n-page="brands.page.title" lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Бренди · CertSwap</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="header-brand">
      <div class="header-brand-logo">CS</div>
      <span class="header-brand-name">CertSwap</span>
    </a>
    <div class="header-right">
      <span class="header-page-title"><span data-i18n="brands.page.title">Бренди</span></span>
      <a href="about.html" class="back-link" style="opacity:.6;font-size:12px"><span data-i18n="nav.about">Про CertSwap</span></a>
      <a href="index.html" class="back-link"><span data-i18n="common.back">← На головну</span></a>
    </div>
  </div>
</header>

<section class="subhero">
  <div class="container">
    <div class="subhero-label" data-i18n="brands.subhero.label">Каталог · Бренди</div>
    <h1 class="subhero-title" data-i18n="brands.subhero.title">Партнерські бренди</h1>
    <p class="subhero-desc" data-i18n="brands.subhero.desc">Усі бренди, з якими працює CertSwap. Активуй, обмінюй, оплачуй.</p>
  </div>
</section>

<main class="container">

  <section class="card">
    <h2 data-i18n="brands.cat.title">Каталог брендів</h2>
    <div id="brandsCatalog" class="cert-grid"></div>
  </section>

  <section class="card highlight">
    <h2 data-i18n="brands.my.balances">Мої баланси</h2>
    <div id="myBalances"><p class="loading" style="display:flex" data-i18n="common.loading">Завантаження…</p></div>
  </section>

</main>

<footer>
  <div class="container">
    <p data-i18n="footer.demo">CertSwap Demo · Testnet Polygon Amoy</p>
    <p class="tech-note"><a href="/terms.html" data-i18n="footer.terms">Terms of Use</a> · <a href="/privacy.html" data-i18n="footer.privacy">Privacy Policy</a> · <a href="/contacts.html" data-i18n="footer.contacts">Contacts</a></p>
  </div>
</footer>

<script src="/js/i18n.js"></script>
<script src="/config/features.js"></script>
<script src="/js/vendor/ethers.min.js"></script>

<script src="js/web3.js"></script>
<script src="js/api.js"></script>
<script src="js/provider.js"></script>
<script>
(function () {
  // Render brand catalog
  const brands  = Provider.getBrands();
  const catalog = document.getElementById('brandsCatalog');
  catalog.innerHTML = brands.map(b => `
    <div class="cert-card" style="text-align:left">
      <div class="cert-brand" style="font-size:var(--text-lg)">${b.name}</div>
      <div style="margin:8px 0;font-size:var(--text-xs);color:var(--cs-muted)">ID: <code>${b.id}</code></div>
      <div class="btn-row" style="gap:6px;flex-wrap:wrap">
        <a href="activate.html" class="btn btn-small">Активувати</a>
        <a href="exchange.html?give=${b.id}" class="btn btn-small btn-outline">Обміняти</a>
        <a href="pay.html?brand=${b.id}" class="btn btn-small btn-outline">Оплатити</a>
      </div>
    </div>`).join('');
})();

// Load balances
(async () => {
  const el   = document.getElementById('myBalances');
  const data = await Provider.getBalance();

  if (!data.success || !data.balances.length) {
    el.innerHTML = '<p class="empty-state">Немає активних балансів. <a href="activate.html">Активуйте перший сертифікат →</a></p>';
    return;
  }

  el.innerHTML = '<div class="balance-list">' +
    data.balances.map(b => `
      <div class="balance-item">
        <div class="balance-brand">
          <div class="balance-name">${b.brandName || b.brand}</div>
          ${b.bonusBalance > 0 ? `<div class="balance-bonus">+${b.bonusBalance} грн бонус</div>` : ''}
        </div>
        <div class="balance-amount">${(b.balance || 0).toLocaleString('uk-UA')} грн</div>
        <div class="balance-actions">
          <a href="pay.html?brand=${encodeURIComponent(b.brand)}"      class="btn btn-small">Оплатити</a>
          <a href="exchange.html?give=${encodeURIComponent(b.brand)}"  class="btn btn-small btn-outline">Обміняти</a>
        </div>
      </div>`).join('') +
  '</div>';
})();
</script>
<script src="/js/pwa.js"></script>
</body>
</html>
